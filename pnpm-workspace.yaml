    '@vue/compiler-core': 3.5.40
    '@vue/devtools-api': 8.1.5
    '@vue/language-core': 3.3.7
    '@vue/test-utils': 2.4.11
    acorn: 8.17.0
    beasties: 0.4.3
    case-police: 2.2.1
    changelogen: 0.6.2
    esbuild: 0.28.1
    eslint: 10.7.0
    eslint-plugin-import-x: 4.17.1
    eslint-plugin-no-only-tests: 3.4.0
    eslint-plugin-perfectionist: 5.10.0
    eslint-typegen: 2.3.1
    h3: 2.0.1-rc.22 # intentionally pinned to match nitro's dependency
    h3-next: 'npm:h3@2.0.1-rc.22' # intentionally pinned to match nitro's dependency
    happy-dom: 20.11.0
    html-validate: 11.5.6
    htmlnano: 3.4.0
    installed-check: 10.0.1
    # must match the patchedDependencies key above
