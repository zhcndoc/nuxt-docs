packages:
  - docs
  - packages/**
  - '!packages/nuxi'
  - '!packages/test-utils'
  - '!packages/nuxt/test/package-fixture/pkg'
  - playground
  - test/fixtures/*
  - test/fixtures/*/_local-modules/*

patchedDependencies:
  changelogen: patches/changelogen.patch
  knip@6.27.0: patches/knip@6.27.0.patch
  nitro@3.0.260610-beta: patches/nitro@3.0.260610-beta.patch

publicHoistPattern:
  - '*-loader'
  - 'webpack-*'

shellEmulator: true

verifyDepsBeforeRun: install

ignoreWorkspaceCycles: true

overrides:
  "@nuxt/kit": "workspace:*"
  "@nuxt/schema": "workspace:*"
  nuxt: "workspace:*"
  oxc-parser: "0.140.0"
  vite: "8.1.5"
  vue: "3.5.40"

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  unrs-resolver: false

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@nuxt/*'
  - fnv1a-64
  # Renovate security update: esbuild@0.28.1
  - esbuild@0.28.1
  - vue-bundle-renderer
  - unimport
  # Renovate security update: undici@8.5.0
  - undici@8.5.0
  - unctx@3.0.0-beta.2
  - magic-string@1.0.0
  - verkit@0.1.2
  - '@unhead/bundler@3.2.1'
  - '@unhead/vue@3.2.1'
  - unhead@3.2.1

catalogs:
  # imported in the nuxt app runtime (packages/nuxt/src/app, head/runtime, pages/runtime)
  app-runtime:
    '@unhead/vue': ^3.2.1
    '@vue/shared': ^3.5.40
    consola: ^3.4.2
    cookie-es: ^3.1.1
    defu: ^6.1.7
    devalue: ^5.8.1
    errx: ^0.1.0
    fnv1a-64: ^0.1.1
    hookable: ^6.1.1
    klona: ^2.0.6
    nostics: ^1.2.0
    object-identity: ^0.2.3
    ofetch: 2.0.0-alpha.3 # intentionally pinned to match nitro's dependency
    ohash: ^2.0.11
    pathe: ^2.0.3
    perfect-debounce: ^2.1.0
    ufo: ^1.6.4
    uncrypto: ^0.1.3
    unctx: ^3.0.0
    unhead: ^3.2.1
    vue: ^3.5.40
    vue-bundle-renderer: ^2.3.1
    vue-router: ^5.2.0

  # imported in the server runtime (packages/nuxt/src/runtime/server, packages/nitro-server/src/runtime)
  nitro-runtime:
    destr: ^2.0.5
    lru-cache: ^11.5.2
    nitro: ^3.0.260610-beta
    srvx: ^0.11.22
    unstorage: 2.0.0-alpha.7 # intentionally pinned to match nitro's dependency

  # vue compiler/tooling
  vue:
    '@vitejs/plugin-vue': ^6.0.8
    # kept in lockstep with the vue override above
    '@vue/compiler-sfc': 3.5.40
    rspack-vue-loader: ^17.6.1
    vue-devtools-stub: ^0.1.0
    vue-loader: ^17.4.2

  # vite/rolldown/oxc toolchain
  vite:
    magic-string: ^1.0.0
    oxc-walker: ^1.0.0
    rolldown: ^1.2.0
    rolldown-string: ^0.3.1
    # resolution is pinned via the vite override above
    vite: ^8.1.5
    vite-node: ^6.0.0
    vite-plugin-checker: ^0.14.4

  # webpack/rspack pipeline
  webpack:
    '@nuxt/friendly-errors-webpack-plugin': ^2.6.0
    '@rsbuild/core': ~2.1.6
    css-loader: ^7.1.4
    css-minimizer-webpack-plugin: ^8.0.0
    esbuild-loader: ^4.5.0
    file-loader: ^6.2.0
    fork-ts-checker-webpack-plugin: ^9.1.0
    hash-sum: ^2.0.0
    memfs: ^4.64.0
    mini-css-extract-plugin: ^2.10.2
    pify: ^6.1.0
    pug-plain-loader: ^1.1.0
    raw-loader: ^4.0.2
    time-fix-plugin: ^2.0.7
    ts-checker-rspack-plugin: ^1.5.2
    url-loader: ^4.1.1
    webpack: ^5.108.4
    webpack-bundle-analyzer: ^5.3.1
    webpack-dev-middleware: ^8.0.3
    webpack-hot-middleware: ^2.26.1
    webpackbar: ^7.0.0

  # build-time deps of published packages
  build:
    '@ampproject/remapping': ^2.3.0
    '@dxup/nuxt': ^0.5.3
    '@nuxt/cli': ^3.37.0
    '@nuxt/devtools': ^4.0.0-alpha.7
    '@nuxt/telemetry': ^2.8.0
    '@vue/shared': ^3.5.40
    autoprefixer: ^10.5.4
    c12: ^3.3.4
    chokidar: ^5.0.0
    compatx: ^0.2.0
    consola: ^3.4.2
    cssnano: ^8.0.2
    defu: ^6.1.7
    destr: ^2.0.5
    errx: ^0.1.0
    escape-string-regexp: ^5.0.0
    exsolve: ^1.1.0
    generic-names: ^4.0.0
    get-port-please: ^3.2.0
    ignore: ^7.0.6
    impound: ^1.1.5
    jiti: ^2.7.0
    js-tokens: ^10.0.0
    klona: ^2.0.6
    knitwork: ^1.3.0
    mlly: ^1.8.2
    mocked-exports: ^0.1.1
    nanotar: ^0.3.0
    nostics: ^1.2.0
    nypm: ^0.6.8
    ohash: ^2.0.11
    on-change: ^6.0.2
    pathe: ^2.0.3
    picomatch: ^4.0.5
    pkg-types: ^2.3.1
    postcss: ^8.5.20
    postcss-import: ^16.1.1
    postcss-import-resolver: ^2.0.0
    postcss-loader: ^8.2.1
    postcss-url: ^10.1.4
    rc9: ^3.0.1
    scule: ^1.3.0
    seroval: ^1.5.5
    std-env: ^4.2.0
    tinyglobby: ^0.2.17
    ufo: ^1.6.4
    ultrahtml: ^1.7.0
    unctx: ^3.0.0
    undici: ^8.7.0
    unenv: 2.0.0-rc.24 # intentionally pinned to match nitro's dependency
    unimport: ^6.3.1
    unplugin: ^3.3.0
    unrouting: ^0.1.7
    untyped: ^2.0.0
    verkit: ^0.1.2
    vue-bundle-renderer: ^2.3.1

  # dev/test/workspace tooling (pinned)
  dev:
    '@arethetypeswrong/cli': 0.18.5
    '@babel/core': 8.0.1
    '@babel/plugin-proposal-decorators': 8.0.2
