name: docs

on:
  merge_group:
  # autofix workflow will be triggered instead for PRs
  push:
    branches:
      - main
      - 4.x
      - 3.x
      - '!v[0-9]*'
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - '*.md'

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/tutorials/authenticate-with-github_token
permissions: {}

jobs:
  lint-docs:
    # autofix workflow handles PRs; run in merge queue and on push to maintenance branches
    if: github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref_name != 'main')
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - name: Prepare
        run: vp run dev:prepare

      - name: Lint (docs)
        run: vp run lint:docs

      - name: Typecheck (docs)
        run: vp run typecheck:docs
