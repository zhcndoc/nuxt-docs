name: ci

on:
  merge_group:
  push:
    branches:
      - main
      - 4.x
      - 3.x
  pull_request:
    branches:
      - main
      - 4.x
      - 3.x
      - '!v[0-9]*'

# https://github.com/vitejs/vite/blob/main/.github/workflows/ci.yml
env:
  # 7 GiB by default on GitHub, setting to 6 GiB
  # https://docs.github.com/en/actions/concepts/runners/github-hosted-runners
  NODE_OPTIONS: --max-old-space-size=6144

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/tutorials/authenticate-with-github_token
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  changes:
    # Skip CI entirely for release merge commits (e.g. "v4.1.0" or "Merge ... from nuxt/v4.1.0")
    if: |-
      github.event_name != 'push' ||
      (
        !contains(github.event.head_commit.message, 'v3.') &&
        !contains(github.event.head_commit.message, 'v4.') &&
        !contains(github.event.head_commit.message, 'v5.')
      )
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          base: ${{ github.event.merge_group.base_sha || github.event.pull_request.base.sha || github.event.before }}
          ref: ${{ github.event.merge_group.head_sha || github.sha }}
          filters: |
            src:
              - 'packages/**'
              - 'test/**'
              - 'scripts/**'
              - 'patches/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
              - 'eslint.config.mjs'
              - '.github/workflows/ci.yml'

  build:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - name: Typecheck
        run: vp run typecheck

      - name: Build and check built types
        run: vp run test:attw

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  codeql:
    if: github.event_name != 'merge_group' && !(github.event_name == 'push' && (contains(github.event.head_commit.message, 'v3.') || contains(github.event.head_commit.message, 'v4.') || contains(github.event.head_commit.message, 'v5.')))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        language: ['javascript-typescript', 'actions']
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          config: |
            paths:
            - 'packages/*/src/**'
            - 'packages/nuxt/bin/**'
            - 'packages/schema/schema/**'
            paths-ignore:
            - 'test/**'
            - '**/*.spec.ts'
            - '**/*.test.ts'
            - '**/__snapshots__/**'
            # codeql bug: #L20C9:9: A parse error occurred: `Unexpected token`.
            - 'packages/vite/src/runtime/vite-node.mjs'
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: '/language:${{ matrix.language }}'

  typecheck:
    # skip on push to main (already tested in merge queue) but run on push to maintenance branches
    needs: changes
    if: needs.changes.outputs.src == 'true' && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os: [ubuntu-24.04-arm, windows-latest]
        module: ['bundler']
        # module: ["bundler", "node"]
        exclude:
          # only run ubuntu in merge queue
          - os: ${{ github.event_name == 'merge_group' && 'windows-latest' || '' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - parallel:
          - name: Test (types)
            run: vp run test:types
            env:
              MODULE_RESOLUTION: ${{ matrix.module }}

          - name: Typecheck (docs)
            run: vp run typecheck:docs

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  lint-and-test:
    # autofix workflow will be triggered instead for PRs; run in merge queue and on push to maintenance branches
    needs: changes
    if: (github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref_name != 'main')) && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - name: Prepare
        run: vp run dev:prepare

      - parallel:
          - name: Lint
            run: vp run lint

          - name: Test (nuxt runtime)
            run: vp run test:runtime

          - name: Test (unit)
            run: vp run test:unit

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  test-size:
    # skip on push to main (already tested in merge queue) but run on push to maintenance branches
    needs: changes
    if: needs.changes.outputs.src == 'true' && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - name: Check bundle size
        run: vp exec vitest run bundle

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  test-benchmark:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' && github.event_name != 'merge_group' && github.repository_owner == 'nuxt'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - name: Prepare test fixtures
        run: vp run test:prepare

      - name: Run benchmarks
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          run: vp exec vitest bench
          token: ${{ secrets.CODSPEED_TOKEN }}
          mode: simulation

  test-fixtures:
    # skip on push to main (already tested in merge queue) but run on push to maintenance branches
    needs: changes
    if: needs.changes.outputs.src == 'true' && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read

    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        include:
          - os: ubuntu-24.04-arm
            projects: '--project "fixtures:vite-dev-*" --project "fixtures:rspack-*"'
          - os: ubuntu-24.04-arm
            projects: '--project "fixtures:vite-built-*" --project "fixtures:webpack-*"'
          - os: windows-latest
            projects: '--project "fixtures:vite-dev-*"'
          - os: windows-latest
            projects: '--project "fixtures:vite-built-*"'
          - os: windows-latest
            projects: '--project "fixtures:rspack-*" --project "fixtures:webpack-*"'

    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 22
          cache: true

      - name: Install Playwright
        run: vp exec playwright-core install chromium

      - name: Prepare test fixtures
        run: vp run test:prepare

      - name: Test (fixtures)
        run: vp exec vitest run ${{ matrix.projects }}

      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: github.event_name != 'push' && matrix.os == 'ubuntu-24.04-arm'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  test-e2e:
    # skip on push to main (already tested in merge queue) but run on push to maintenance branches
    needs: changes
    if: needs.changes.outputs.src == 'true' && (github.event_name != 'push' || github.ref_name != 'main')
    runs-on: ${{ matrix.os }}
    permissions:
      actions: write
      contents: read

    strategy:
      fail-fast: ${{ github.event_name == 'merge_group' }}
      matrix:
        os: [ubuntu-24.04-arm, windows-latest]

    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: 22
          cache: true

      - name: Install Playwright
        run: vp exec playwright-core install chromium

      - name: Prepare test fixtures
        run: vp run test:prepare

      - name: Test (e2e)
        run: vp run test:e2e

      - name: Cancel workflow on failure
        if: failure() && github.event_name == 'merge_group'
        run: gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

  ci-ok:
    # This job is the single required check for merge queues and branch protection.
    # All other jobs feed into this one. Skipped jobs are treated as successful.
    if: always()
    runs-on: ubuntu-24.04-arm
    needs:
      - changes
      - build
      - codeql
      - typecheck
      - lint-and-test
      - test-size
      - test-fixtures
      - test-e2e
    steps:
      - name: Check required jobs
        run: |
          # Fail if any needed job was not successful (skipped counts as success)
          results=( \
            "${{ needs.changes.result }}" \
            "${{ needs.build.result }}" \
            "${{ needs.codeql.result }}" \
            "${{ needs.typecheck.result }}" \
            "${{ needs.lint-and-test.result }}" \
            "${{ needs.test-size.result }}" \
            "${{ needs.test-fixtures.result }}" \
            "${{ needs.test-e2e.result }}" \
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "One or more required jobs failed or were cancelled: $result"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped."

  release-nightly:
    concurrency:
      group: release-nightly
    permissions:
      id-token: write
    if: |
      github.event_name == 'push' &&
      github.repository_owner == 'nuxt' &&
      !contains(github.event.head_commit.message, '[skip-release]') &&
      !startsWith(github.event.head_commit.message, 'docs')
    needs: changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: latest
          cache: true

      - name: Release nightly
        run: node scripts/release.ts --nightly
        env:
          TAG: ${{ github.ref == 'refs/heads/main' && '5x' || github.ref == 'refs/heads/4.x' && 'latest' || '3x' }}

  release-pkg-pr-new:
    if: github.repository_owner == 'nuxt'
    needs: changes
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: lts
          cache: true

      - run: vp exec pkg-pr-new publish --compact --pnpm './packages/kit' './packages/nitro-server' './packages/nuxt' './packages/rspack' './packages/schema' './packages/vite' './packages/webpack' # zizmor: ignore[use-trusted-publishing] pkg-pr-new uses GitHub OIDC trusted publishing internally; no npm token is required in this step
